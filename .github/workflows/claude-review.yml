name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are reviewing a pull request on `minzique/pi-team`, a multi-agent
            orchestration harness built on pi RPC mode. Read the diff and the
            existing code around it carefully. Think like an outside reviewer
            who was not part of writing this code.

            Focus on:
            - Correctness. Does the code do what the commit message says? Edge
              cases, error handling, race conditions in the orchestrator loop,
              subprocess lifecycle.
            - Architecture fit. Does it match the existing patterns in this repo
              (strict TypeScript, no any, no @ts-ignore, small modules, explicit
              cleanup)? Does it introduce a new pattern without reason?
            - Concurrency and IPC. pi-team spawns pi subprocesses and talks to
              them via JSONL. Be paranoid about stdin/stdout handling, unclosed
              handles keeping the event loop alive, missed shutdowns, socket
              cleanup.
            - Security. User injection over Unix socket / HTTP — any new path
              that lets unauthenticated input reach an agent's context?
            - Plan-aware usage tracking (src/usage/**). The cost/limit numbers
              matter — flag anything that could show wrong percentages or
              leak API cost as authoritative for subscription users.
            - TypeScript strictness. No silent `any`, no type assertions hiding
              real issues.

            When you find something, be specific: file + line + concrete fix.
            When the code is fine, say so and move on. Do not pad with
            "consider adding tests" unless the omission is genuinely load-bearing.

            The PR branch is already checked out in the current working directory.

            How to post your review:
            - Use `mcp__github_inline_comment__create_inline_comment` (with
              `confirmed: true`) for line-specific issues. One per finding.
            - Use `gh pr comment $PR_NUMBER --body "..."` for the top-level
              summary comment. End the summary with one of:
                LGTM
                LGTM with nits
                needs changes
            - Only post GitHub comments — don't output review text as a plain
              message back to the user. The comments ARE the review.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(cat:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(ls:*)"
